<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8A00;stop-opacity:1" />
        </linearGradient>

        <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6BB6FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4D96FF;stop-opacity:1" />
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="64" height="64" rx="12" fill="#2B3467"/>

    <!-- Sun -->
    <circle cx="26" cy="26" r="12" fill="url(#sunGradient)" filter="url(#glow)"/>

    <!-- Sun rays -->
    <g fill="url(#sunGradient)" opacity="0.8">
        <circle cx="26" cy="10" r="2"/>
        <circle cx="26" cy="42" r="2"/>
        <circle cx="10" cy="26" r="2"/>
        <circle cx="42" cy="26" r="2"/>
        <circle cx="15" cy="15" r="1.5"/>
        <circle cx="37" cy="15" r="1.5"/>
        <circle cx="15" cy="37" r="1.5"/>
        <circle cx="37" cy="37" r="1.5"/>
    </g>

    <!-- Cloud -->
    <g filter="url(#glow)">
        <circle cx="32" cy="42" r="8" fill="url(#cloudGradient)"/>
        <circle cx="45" cy="42" r="10" fill="url(#cloudGradient)"/>
        <circle cx="55" cy="45" r="7" fill="url(#cloudGradient)"/>
    </g>
</svg>